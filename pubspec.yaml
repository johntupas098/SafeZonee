name: emergency_response_app
description: LIVE Real-time Emergency Response App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  geolocator: ^13.0.0
  google_maps_flutter: ^2.5.3
  flutter_spinkit: ^5.2.1
  permission_handler: ^12.0.1
  http: ^1.1.0
  url_launcher: ^6.3.2
  stream_channel: ^2.1.1
  socket_io_client: ^3.1.4
  image_picker: ^1.0.7
  supabase_flutter: ^2.8.0
  flutter_webrtc: ^0.12.1
  peerdart: ^0.5.6
  audio_session: ^0.1.21

dependency_overrides:
  flutter_webrtc: ^0.12.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true